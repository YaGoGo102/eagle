<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Goku Bot Dashboard</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: monospace; padding: 20px; }
        #log { border: 1px solid #444; padding: 10px; height: 200px; overflow-y: scroll; }
    </style>
</head>
<body>
    <h1>🤖 Goku Bot リアルタイム通信</h1>
    <div id="status">接続待機中...</div>
    <div id="log"></div>

    <script>
        // PCのIPアドレス（localhostで動いているならlocalhostでOK）
        const ws = new WebSocket('ws://' + window.location.hostname + ':8080');

        ws.onopen = () => {
            document.getElementById('status').innerText = "✅ サーバーに接続しました";
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const log = document.getElementById('log');
            log.innerHTML += `<p>座標更新: X=${data.x.toFixed(2)}, Y=${data.y.toFixed(2)}</p>`;
            log.scrollTop = log.scrollHeight; // 自動スクロール
        };

        ws.onerror = (err) => {
            document.getElementById('status').innerText = "❌ 接続失敗: サーバーが起動しているか確認してください";
        };
    </script>
</body>
</html>
