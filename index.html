<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>🎮 C++ Minecraft BE Web-NPC Controller 🎮</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a24; color: #fff; margin: 0; padding: 40px; text-align: center; }
        .panel { max-width: 650px; margin: 0 auto; background: #252532; padding: 30px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.6); border: 1px solid #3a3a4f; }
        h2 { color: #4caf50; margin-bottom: 25px; font-size: 28px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        input, button { padding: 12px; margin: 8px; border-radius: 8px; border: none; font-size: 16px; outline: none; }
        input { width: 55%; background: #1e1e2a; color: #fff; border: 1px solid #444; }
        input:focus { border-color: #4caf50; }
        button { background: #4caf50; color: white; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        button:hover { background: #45a049; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        .btn-danger { background: #f44336; }
        .btn-danger:hover { background: #da190b; }
        .btn-blue { background: #00bcd4; }
        .btn-blue:hover { background: #00acc1; }
        .pad { display: grid; grid-template-columns: repeat(3, 1fr); width: 220px; margin: 30px auto; gap: 12px; }
        .status { margin-top: 25px; font-size: 15px; font-weight: bold; color: #ffeb3b; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="panel">
    <h2>🎮 Web-NPC 操作パネル (GitHub Pages)</h2>
    
    <div>
        <input type="text" id="botName" value="Goku_Bot" placeholder="NPCの名前を入力...">
        <button onclick="spawnBot()">召喚 (Spawn)</button>
        <button class="btn-danger" onclick="disconnectBot()">切断 (Quit)</button>
    </div>

    <div class="pad">
        <div></div><button onclick="moveBot('forward')">▲ 前進</button><div></div>
        <button onclick="moveBot('left')">◀ 左折</button><button onclick="moveBot('jump')" class="btn-blue">🚀 跳躍</button><button onclick="moveBot('right')">右折 ▶</button>
        <div></div><button onclick="moveBot('backward')">▼ 後退</button><div></div>
    </div>

    <div style="margin-top: 25px;">
        <input type="text" id="chatMsg" placeholder="マイクラ内へのチャットメッセージ..." style="width: 65%;">
        <button onclick="sendChat()" style="background: #2196f3; width: 20%;">発言</button>
    </div>

    <div class="status" id="wsStatus">自宅のC++サーバー（WebSocket）に接続を試みています...</div>
</div>

<script>
    // 手元のC++サーバーへ自動接続
    const socket = new WebSocket("ws://localhost:18080/ws");

    socket.onopen = () => {
        const status = document.getElementById("wsStatus");
        status.innerText = "● 自宅のC++バックエンドと接続成功！ (超快適・ラグなし)";
        status.style.color = "#4caf50";
    };

    socket.onclose = () => {
        const status = document.getElementById("wsStatus");
        status.innerText = "❌ 自宅のC++バックエンドが起動していないか、切断されました";
        status.style.color = "#f44336";
    };

    function send(data) {
        if (socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify(data));
        }
    }

    function spawnBot() {
        send({ action: "spawn", botName: document.getElementById("botName").value });
    }

    function disconnectBot() {
        send({ action: "disconnect", botName: document.getElementById("botName").value });
    }

    function moveBot(dir) {
        send({ action: "move", botName: document.getElementById("botName").value, direction: dir });
    }

    function sendChat() {
        const msgInput = document.getElementById("chatMsg");
        if(!msgInput.value) return;
        send({ action: "chat", botName: document.getElementById("botName").value, message: msgInput.value });
        msgInput.value = "";
    }
</script>

</body>
</html>
