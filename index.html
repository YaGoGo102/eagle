<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WebCraft Controller</title>
    <style>
        body { background: #222; color: #fff; text-align: center; padding-top: 50px; }
        input { padding: 10px; width: 200px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>WebCraft Launcher</h1>
    <p>自宅PCのIPを入力してください</p>
    <input id="ip" value="192.168.1.XX"> <button onclick="go()">マイクラ画面へ</button>

    <script>
        function go() {
            const ip = document.getElementById('ip').value;
            window.location.href = `http://${ip}:8080`;
        }
    </script>
</body>
</html>
