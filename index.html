<!DOCTYPE html>
<html>
<body>
    <h1>マイクラボット操作中...</h1>
    <div id="status">HPデータ待機中</div>
    <script>
        // WebSocketでサーバーと通信
        const ws = new WebSocket('ws://' + window.location.host);
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            document.getElementById('status').innerText = "HP: " + data.health;
        };
    </script>
</body>
</html>
