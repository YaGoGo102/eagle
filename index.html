<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Bot Controller</title>
    <style>
        body { background: #222; color: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { max-width: 400px; margin: 0 auto; background: #333; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h1 { font-size: 20px; color: #ffaa00; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #222; border: 1px solid #555; color: #fff; text-align: center; font-size: 16px; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #55ff55; color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        #status-panel { display: none; margin-top: 20px; background: #444; padding: 15px; border-radius: 4px; color: #ffaa00; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🤖 ボット遠隔操作パネル</h1>
        
        <div id="login-form">
            <input type="text" id="username" value="Goku_Bot_1" maxlength="16">
            <button onclick="connectBot()">この名前で参加させる</button>
        </div>

        <div id="status-panel">
            接続完了！ 👤 <span id="bot-name" style="color:#fff;"></span><br><br>
            <span style="color:#fff; font-size:14px;">
                このタブを選択した状態で、キーボードの<br>
                <strong>W, A, S, D / Space</strong> を押すとボットが動きます！
            </span>
            <br><br>
            <span style="color:#aaa; font-size:11px; font-weight:normal;">（このタブを閉じるとマイクラから自動退出します）</span>
        </div>
    </div>

    <script>
        let ws = null;
        const keys = { forward: false, back: false, left: false, right: false, jump: false };

        function connectBot() {
            const user = document.getElementById('username').value.trim();
            if (!user) return alert("名前を入力してください");

            // 自宅PCのサーバー（localhost）に接続
            ws = new WebSocket('ws://localhost:8080');

            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'login', username: user }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'login_success') {
                    document.getElementById('login-form').style.display = 'none';
                    document.getElementById('status-panel').style.display = 'block';
                    document.getElementById('bot-name').innerText = user;
                }
            };

            ws.onerror = () => alert("中継サーバー(server.js)が起動していません。");
        }

        const sendMove = () => { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'move', ...keys })); };
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (['w','a','s','d',' '].includes(k)) {
                if (k === 'w') keys.forward = true; if (k === 's') keys.back = true;
                if (k === 'a') keys.left = true; if (k === 'd') keys.right = true;
                if (k === ' ') keys.jump = true; sendMove();
            }
        });
        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (['w','a','s','d',' '].includes(k)) {
                if (k === 'w') keys.forward = false; if (k === 's') keys.back = false;
                if (k === 'a') keys.left = false; if (k === 'd') keys.right = false;
                if (k === ' ') keys.jump = false; sendMove();
            }
        });
    </script>
</body>
</html>
