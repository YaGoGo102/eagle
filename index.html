<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Eagler Bot Play</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #111; font-family: monospace; color: #fff; }
        #login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #222; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .box { background: #333; padding: 30px; border-radius: 10px; text-align: center; }
        input { width: 280px; padding: 12px; margin-bottom: 15px; background: #111; border: 1px solid #555; color: #fff; text-align: center; font-size: 16px; }
        button { padding: 12px 30px; background: #55ff55; color: #000; font-weight: bold; border: none; cursor: pointer; font-size: 16px; }
        #screen-container { width: 100%; height: 100%; display: none; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="box">
            <h2 style="color:#ffaa00; margin-bottom:20px;">🎮 ブラウザ遠隔マイクラ画面</h2>
            <input type="text" id="server-ip" placeholder="自宅PCのIPアドレス" value="localhost"><br>
            <input type="text" id="username" placeholder="ボット名" value="Goku_Bot"><br>
            <button onclick="startStreamGame()">ワールドの画面を映す</button>
        </div>
    </div>

    <div id="screen-container">
        <iframe id="live-screen" src=""></iframe>
    </div>

    <script>
        let ws = null;
        const keys = { forward: false, back: false, left: false, right: false, jump: false };

        function startStreamGame() {
            const ip = document.getElementById('server-ip').value.trim();
            const user = document.getElementById('username').value.trim();
            if (!ip || !user) return alert("入力してください");

            // 3000番〜のポートで画面を読み込む
            const myViewPort = 3000;
            ws = new WebSocket(`ws://${ip}:8080`);

            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'login', username: user, viewPort: myViewPort }));
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'login_success') {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('screen-container').style.display = 'block';
                    // 自宅PCから送られてくるボットの視点（3D画面）をそのまま表示
                    document.getElementById('live-screen').src = `http://${ip}:${data.viewPort}`;
                    
                    setupControls();
                }
            };

            ws.onerror = () => alert("接続失敗。");
        }

        function setupControls() {
            const sendMove = () => { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'move', ...keys })); };
            window.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                if (['w','a','s','d',' '].includes(k)) {
                    if (k === 'w') keys.forward = true; if (k === 's') keys.back = true;
                    if (k === 'a') keys.left = true; if (k === 'd') keys.right = true;
                    if (k === ' ') keys.jump = true; sendMove();
                }
            });
            window.addEventListener('keyup', (e) => {
                const k = e.key.toLowerCase();
                if (['w','a','s','d',' '].includes(k)) {
                    if (k === 'w') keys.forward = false; if (k === 's') keys.back = false;
                    if (k === 'a') keys.left = false; if (k === 'd') keys.right = false;
                    if (k === ' ') keys.jump = false; sendMove();
                }
            });
        }
    </script>
</body>
</html>
