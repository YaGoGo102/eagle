<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>WebCraft Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
        #login-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:#222; display:flex; justify-content:center; align-items:center; z-index:100; }
        .box { background:#333; padding:30px; border-radius:10px; color:#fff; text-align:center; }
        input { width:250px; padding:10px; margin-bottom:10px; border-radius:5px; border:none; }
        button { padding:10px 20px; background:#55ff55; border:none; cursor:pointer; font-weight:bold; }
        #game-canvas { width: 100%; height: 100%; display: none; cursor: crosshair; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="box">
            <h2>WebCraft 3D Client</h2>
            <input type="text" id="ip" value="localhost" placeholder="IPアドレス"><br>
            <input type="text" id="user" value="Goku_Bot" placeholder="ボット名"><br>
            <button onclick="start()">接続</button>
        </div>
    </div>
    <div id="game-canvas"></div>

    <script>
        let ws, scene, camera, renderer;
        // 対応キーを網羅
        const keys = { w:false, a:false, s:false, d:false, space:false, shift:false, ctrl:false };

        function start() {
            const ip = document.getElementById('ip').value;
            const user = document.getElementById('user').value;
            
            // 3D環境初期化
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('game-canvas').appendChild(renderer.domElement);
            document.getElementById('game-canvas').style.display = 'block';
            document.getElementById('login-screen').style.display = 'none';

            // サーバー接続
            ws = new WebSocket(`ws://${ip}:8080`);
            ws.onopen = () => ws.send(JSON.stringify({type:'login', username:user}));
            
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if(data.type === 'sync_3d') {
                    camera.position.set(data.botPos.x, data.botPos.y + 1.6, data.botPos.z);
                    const tX = camera.position.x - Math.sin(data.botYaw) * Math.cos(data.botPitch);
                    const tY = camera.position.y + Math.sin(data.botPitch);
                    const tZ = camera.position.z - Math.cos(data.botYaw) * Math.cos(data.botPitch);
                    camera.lookAt(tX, tY, tZ);
                    renderer.render(scene, camera);
                }
            };

            // 操作イベント登録
            window.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                if(k in keys || k === ' ') {
                    if(k === ' ') keys.space = true; else keys[k] = true;
                    ws.send(JSON.stringify({type:'move', ...keys}));
                }
            });
            window.addEventListener('keyup', (e) => {
                const k = e.key.toLowerCase();
                if(k in keys || k === ' ') {
                    if(k === ' ') keys.space = false; else keys[k] = false;
                    ws.send(JSON.stringify({type:'move', ...keys}));
                }
            });
            
            // マウス操作とポインターロック
            const canvas = document.getElementById('game-canvas');
            canvas.onclick = () => canvas.requestPointerLock();
            
            document.addEventListener('mousedown', (e) => {
                if(document.pointerLockElement) ws.send(JSON.stringify({type:'click', button:e.button}));
            });
            
            document.addEventListener('mousemove', (e) => {
                if(document.pointerLockElement) ws.send(JSON.stringify({type:'look', dx:-e.movementX*0.002, dy:-e.movementY*0.002}));
            });
            
            // コンテキストメニュー無効化（右クリック対策）
            canvas.oncontextmenu = (e) => e.preventDefault();
        }
    </script>
</body>
</html>
