<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Goku_Bot 遠隔ラジコンパネル</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; text-align: center; }
        #panel { margin: 20px auto; width: 400px; padding: 20px; background: #333; border-radius: 10px; }
        .status { font-size: 18px; margin: 10px 0; color: #55ff55; }
        .controls { font-weight: bold; color: #ffaa00; margin-top: 20px; }
        #inventory { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 10px; }
        .item-slot { width: 60px; height: 60px; background: #444; border: 2px solid #555; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 10px; }
    </style>
</head>
<body>
    <h1>🤖 Goku_Bot コントロールパネル (複数人対応)</h1>
    <p>GitHub Pages からローカルのボットをみんなでWASDリアルタイム操作</p>

    <div id="panel">
        <div class="status">接続状態: <span id="ws-status" style="color:red;">切断</span></div>
        <div class="status">座標: X:<span id="pos-x">0</span> Y:<span id="pos-y">0</span> Z:<span id="pos-z">0</span></div>
        <div class="status">HP: ❤️<span id="bot-hp">20</span> | 🍖:<span id="bot-food">20</span></div>
        
        <div class="controls">
            【操作方法】<br>
            キーボードの <strong>W, A, S, D</strong> で移動<br>
            <strong>Space</strong> でジャンプ
        </div>

        <h3>🎒 ボットのインベントリ</h3>
        <div id="inventory"></div>
    </div>

    <script>
        const ws = new WebSocket('ws://localhost:8080');
        const keys = { forward: false, back: false, left: false, right: false, jump: false };

        ws.onopen = () => {
            document.getElementById('ws-status').innerText = '接続中 (操作可能)';
            document.getElementById('ws-status').style.color = '#55ff55';
        };

        ws.onclose = () => {
            document.getElementById('ws-status').innerText = '切断されました';
            document.getElementById('ws-status').style.color = 'red';
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'status') {
                document.getElementById('pos-x').innerText = data.pos.x.toFixed(1);
                document.getElementById('pos-y').innerText = data.pos.y.toFixed(1);
                document.getElementById('pos-z').innerText = data.pos.z.toFixed(1);
                document.getElementById('bot-hp').innerText = data.hp;
                document.getElementById('bot-food').innerText = data.food;

                const invDiv = document.getElementById('inventory');
                invDiv.innerHTML = '';
                data.inventory.forEach(item => {
                    const slot = document.createElement('div');
                    slot.className = 'item-slot';
                    slot.innerHTML = `<div>${item.name}</div><div>x${item.count}</div>`;
                    invDiv.appendChild(slot);
                });
            }
        };

        const sendMove = () => {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'move', ...keys }));
            }
        };

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'w') keys.forward = true;
            if (e.key.toLowerCase() === 's') keys.back = true;
            if (e.key.toLowerCase() === 'a') keys.left = true;
            if (e.key.toLowerCase() === 'd') keys.right = true;
            if (e.key === ' ') keys.jump = true;
            sendMove();
        });

        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'w') keys.forward = false;
            if (e.key.toLowerCase() === 's') keys.back = false;
            if (e.key.toLowerCase() === 'a') keys.left = false;
            if (e.key.toLowerCase() === 'd') keys.right = false;
            if (e.key === ' ') keys.jump = false;
            sendMove();
        });
    </script>
</body>
</html>
