<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Web-Forge Client</title>
    <script src="eaglercraftx.js"></script>
</head>
<body>
    <div id="game_container" style="width:100vw; height:100vh;"></div>

    <script>
        // WebSocketの接続先をあなたのWSSサーバーに向ける
        window.eaglercraftXOpts = {
            container: "game_container",
            assetsURI: "assets.epk",
            serverAddress: "wss://あなたのドメインまたはIP:8080", 
            hideBanner: true,
            // 最新Forge Modサーバーとの互換性を保つための設定
            checkInterval: 2000,
            joinDelay: 500
        };
        
        // クライアントを起動
        window.addEventListener("load", () => {
            eaglercraftX.startGame();
        });
    </script>
</body>
</html>
