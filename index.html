<!DOCTYPE html>
<html>
<body>
    <h1>マイクラボット操作画面</h1>
    <div id="hud">HP: --</div>
    <script>
        const ws = new WebSocket('ws://' + window.location.host);
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            document.getElementById('hud').innerText = `HP: ${Math.floor(data.health)}`;
        };
    </script>
</body>
</html>
